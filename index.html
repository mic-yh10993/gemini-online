<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S-I-M的私有AI助手</title>
    <link rel="icon" href="./icon.ico" type="image/x-icon">
    <!-- Markdown 渲染库 marked -->
    <script src="./marked.min.js"></script>
    <!-- KaTeX 数学公式渲染库 -->
    <link rel="stylesheet" href="./katex.min.css">
    <script defer src="./katex.min.js"></script>
    <script defer src="./contrib/auto-render.min.js" onload="renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}] });"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(72, 187, 255, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .login-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(8, 12, 24, 0.6);
            backdrop-filter: blur(8px);
        }

        .login-card {
            background: #0f172ad9;
            padding: 2rem 2rem 2.5rem;
            border-radius: 2rem;
            width: 320px;
            text-align: center;
            border: 1px solid #2d3a60;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .login-card h2 {
            color: #e2e8f0;
            margin-bottom: 1.5rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .login-card input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 1.2rem;
            color: #f1f5f9;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            margin-bottom: 1.5rem;
        }

        .login-card input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }

        .login-card button {
            width: 100%;
            background: linear-gradient(95deg, #1e3a8a, #3b82f6);
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -6px #1e3a8a;
        }

        .error-msg {
            color: #f87171;
            font-size: 0.8rem;
            margin-top: 0.8rem;
        }

        .chat-panel {
            flex: 1;
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            background: rgba(0, 20, 40, 0.6);
            border-bottom: 1px solid #2d3a60;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .chat-header h3 {
            color: #b9e2ff;
            font-weight: 500;
            margin-right: auto;
        }

        .model-selector {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            color: #e2e8f0;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        .status-badge {
            background: #1e293b;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            color: #86efac;
            border-left: 2px solid #22c55e;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }

        .message.user {
            align-self: flex-end;
            justify-content: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.8rem 1.2rem;
            border-radius: 1.5rem;
            line-height: 1.45;
            font-size: 0.9rem;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .user .bubble {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            border-bottom-right-radius: 0.3rem;
        }

        .assistant .bubble {
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 0.3rem;
            border: 1px solid #3b4a6b;
        }

        /* Markdown 内容样式 */
        .assistant .bubble p {
            margin: 0.5em 0;
        }
        .assistant .bubble p:first-child {
            margin-top: 0;
        }
        .assistant .bubble p:last-child {
            margin-bottom: 0;
        }
        .assistant .bubble code {
            background: #0f172a;
            padding: 0.2em 0.4em;
            border-radius: 0.3rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.85em;
        }
        .assistant .bubble pre {
            background: #0f172a;
            padding: 0.8rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .assistant .bubble pre code {
            background: none;
            padding: 0;
        }
        .assistant .bubble ul, .assistant .bubble ol {
            padding-left: 1.5em;
            margin: 0.5em 0;
        }
        .assistant .bubble li {
            margin: 0.2em 0;
        }
        .assistant .bubble h1, .assistant .bubble h2, .assistant .bubble h3 {
            margin: 0.8em 0 0.4em;
            font-weight: 600;
        }
        .assistant .bubble h1 { font-size: 1.3em; }
        .assistant .bubble h2 { font-size: 1.2em; }
        .assistant .bubble h3 { font-size: 1.1em; }
        .assistant .bubble blockquote {
            border-left: 3px solid #3b82f6;
            padding-left: 1em;
            margin: 0.5em 0;
            color: #94a3b8;
        }
        .assistant .bubble a {
            color: #60a5fa;
            text-decoration: none;
        }
        .assistant .bubble a:hover {
            text-decoration: underline;
        }
        .assistant .bubble table {
            border-collapse: collapse;
            margin: 0.5em 0;
            width: 100%;
        }
        .assistant .bubble th, .assistant .bubble td {
            border: 1px solid #334155;
            padding: 0.4rem 0.6rem;
            text-align: left;
        }
        .assistant .bubble th {
            background: #1e293b;
        }
        /* KaTeX 数学公式样式 */
        .katex {
            font-size: 1.05em;
        }
        .katex-display {
            margin: 0.8em 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 0.8rem 1.2rem;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .input-area {
            padding: 1rem 1.5rem 1.5rem;
            background: rgba(8, 12, 24, 0.5);
            border-top: 1px solid #2d3a60;
            display: flex;
            gap: 0.8rem;
        }

        .input-area input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
            color: #f1f5f9;
            font-size: 0.9rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: #3b82f6;
        }

        .input-area button {
            background: #3b82f6;
            border: none;
            border-radius: 2rem;
            padding: 0 1.5rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:hover {
            background: #2563eb;
            transform: scale(0.97);
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            padding: 0.6rem;
            color: #4a5b7e;
            border-top: 1px solid #1e2a44;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <!-- 登录面板 -->
    <div id="loginPanel" class="login-panel">
        <div class="login-card">
            <h2>🔐 安全验证</h2>
            <input type="password" id="passwordInput" placeholder="请输入访问密码" autocomplete="off">
            <button id="unlockBtn">解锁对话</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- 聊天面板 (初始隐藏) -->
    <div id="chatPanel" class="chat-panel" style="display: none;">
        <div class="chat-header">
            <span>🤖</span>
            <h3>S-I-M的私有AI助手</h3>
            <select id="modelSelect" class="model-selector">
                <option value="gemini">Gemini (gemini-3-flash-preview)</option>
                <option value="gpt-4o">GPT-4o</option>
                <option value="gpt-5">GPT-5</option>
                <option value="gpt-5-mini" selected>GPT-5-mini</option>
            </select>
            <div class="status-badge" id="connStatus">● 就绪</div>
        </div>
        <div id="messagesContainer" class="messages-area">
            <div class="message assistant">
                <div class="bubble">👋 你好！我是**S-I-M**的私人AI助手，我支持**多模型切换**（Gemini / GPT-4o / GPT-5 / GPT-5-mini）我可以记住上下文，支持 Markdown 和数学公式渲染。默认使用 GPT-5-mini，试试提问吧！</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
        <footer>⚡ 端到端加密保护 · 凭据已混淆存储 · 支持多轮对话 · Markdown + 数学公式渲染</footer>
    </div>
</div>

<script>
    // ======================= 安全模块：敏感信息混淆存储 =======================
    // 密码 "mic" Base64: bWlj
    const _pwdPart1 = "bW";
    const _pwdPart2 = "lj";
    const _encodedPwd = _pwdPart1 + _pwdPart2;
    
    // Gemini密钥存储
    const _geminiPart1 = "QUl6YVN5RDg3ZUx2OUdDV1FFTUJrQ3cybX";
    const _geminiPart2 = "NROGJSdm1kSXl5TUo4";
    const _encodedGemini = _geminiPart1 + _geminiPart2;
    
    //GPT密钥存储
    const _gptKeyPart1 = "c2stV1didWF4aDZmQzc5VHM3dkZRRHQzSmoyNHR3VzhqYkRVNFNlQ3kwcXYyV0dxWHo4";
    // 由于密钥长度适中，不再拆分，直接存储完整 Base64 串（但为了混淆，可再拆，但保持一致性）
    const _encodedGpt = _gptKeyPart1;
    
    function _getPwd() { return atob(_encodedPwd); }
    function _getGeminiKey() { return atob(_encodedGemini); }
    function _getGptKey() { return atob(_encodedGpt); }
    
    const __secure = {
        password: _getPwd(),
        geminiKey: _getGeminiKey(),
        gptKey: _getGptKey()
    };
    Object.freeze(__secure);
    
    window._getPwd = undefined;
    window._getGeminiKey = undefined;
    window._getGptKey = undefined;
    
    // ======================= API 配置 =======================
    // Gemini 配置
    const GEMINI_MODEL = "gemini-3-flash-preview";
    const GEMINI_BASE = "https://gemini.s-i-m.cc.cd";
    
    // GPT 配置 (OpenAI 兼容)
    const GPT_BASE = "https://api.chatanywhere.tech/v1/chat/completions";
    
    let cachedGeminiKey = null;
    let cachedGptKey = null;
    
    // ======================= 上下文对话管理 =======================
    // 统一使用 OpenAI 的消息格式存储历史: { role: "user" | "assistant", content: "..." }
    let conversationHistory = [];
    
    function addToHistory(role, content) {
        conversationHistory.push({ role: role, content: content });
    }
    
    // ======================= Markdown 与数学公式渲染 =======================
    if (typeof marked !== 'undefined') {
        marked.setOptions({
            gfm: true, breaks: true, headerIds: false, mangle: false, smartLists: true
        });
    }
    
    function renderMarkdownAndMath(text) {
        if (!text) return '';
        try {
            let html = marked.parse(text);
            html = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(tempDiv, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            }
            return tempDiv.innerHTML;
        } catch (e) {
            console.error('渲染失败:', e);
            return text;
        }
    }
    
    // ======================= API 调用函数 =======================
    // Gemini 调用
    async function callGemini(userMsg) {
        if (!cachedGeminiKey) cachedGeminiKey = __secure.geminiKey;
        const url = `${GEMINI_BASE}/v1beta/models/${GEMINI_MODEL}:generateContent?key=${cachedGeminiKey}`;
        // 将历史转换为 Gemini 格式
        const contents = [];
        for (const msg of conversationHistory) {
            contents.push({ role: msg.role === 'user' ? 'user' : 'model', parts: [{ text: msg.content }] });
        }
        contents.push({ role: 'user', parts: [{ text: userMsg }] });
        const body = { contents: contents };
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            let errMsg = `HTTP ${res.status}`;
            try { const errData = await res.json(); errMsg = errData.error?.message || errMsg; } catch(e) {}
            throw new Error(errMsg);
        }
        const data = await res.json();
        if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
            return data.candidates[0].content.parts[0].text;
        }
        return "未获取到有效回复。";
    }
    
    // GPT 调用 (支持 gpt-4o, gpt-5, gpt-5-mini)
    async function callGPT(model, userMsg) {
        if (!cachedGptKey) cachedGptKey = __secure.gptKey;
        const messages = [...conversationHistory];
        messages.push({ role: 'user', content: userMsg });
        const body = {
            model: model,
            messages: messages,
            stream: false
        };
        const res = await fetch(GPT_BASE, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${cachedGptKey}`
            },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            let errMsg = `HTTP ${res.status}`;
            try { const errData = await res.json(); errMsg = errData.error?.message || errMsg; } catch(e) {}
            throw new Error(errMsg);
        }
        const data = await res.json();
        if (data.choices && data.choices[0] && data.choices[0].message) {
            return data.choices[0].message.content;
        }
        return "未获取到有效回复。";
    }
    
    // ======================= 聊天界面逻辑 =======================
    document.addEventListener('DOMContentLoaded', function() {
        const loginPanel = document.getElementById('loginPanel');
        const chatPanel = document.getElementById('chatPanel');
        const pwdInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const loginError = document.getElementById('loginError');
        const messagesContainer = document.getElementById('messagesContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const connStatus = document.getElementById('connStatus');
        const modelSelect = document.getElementById('modelSelect');
        
        let isWaiting = false;
        let typingIndicator = null;
        
        function addMessage(role, content, isError = false, addToHist = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (isError) {
                bubble.style.background = "#4a1a2c";
                bubble.style.border = "1px solid #ef4444";
                bubble.style.color = "#ffc9c9";
                bubble.innerText = content;
            } else {
                if (role === 'assistant') {
                    bubble.innerHTML = renderMarkdownAndMath(content);
                    const links = bubble.querySelectorAll('a');
                    links.forEach(link => {
                        link.setAttribute('target', '_blank');
                        link.setAttribute('rel', 'noopener noreferrer');
                    });
                } else {
                    bubble.innerText = content;
                }
            }
            msgDiv.appendChild(bubble);
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            if (addToHist && !isError && role !== 'system') {
                addToHistory(role, content);
            }
        }
        
        function showTyping() {
            if (typingIndicator) return;
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
            typingDiv.appendChild(bubble);
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            typingIndicator = typingDiv;
        }
        
        function hideTyping() {
            if (typingIndicator) {
                typingIndicator.remove();
                typingIndicator = null;
            }
        }
        
        async function handleSend() {
            if (isWaiting) {
                addMessage("assistant", "请等待上一条回复处理完成...", true, false);
                return;
            }
            const msg = userInput.value.trim();
            if (!msg) return;
            userInput.value = '';
            addMessage("user", msg, false, true);
            isWaiting = true;
            connStatus.innerText = "⏳ 等待服务器响应";
            sendBtn.disabled = true;
            showTyping();
            
            const selected = modelSelect.value;
            try {
                let reply = "";
                if (selected === "gemini") {
                    reply = await callGemini(msg);
                } else if (selected === "gpt-4o") {
                    reply = await callGPT("gpt-4o", msg);
                } else if (selected === "gpt-5") {
                    reply = await callGPT("gpt-5", msg);
                } else if (selected === "gpt-5-mini") {
                    reply = await callGPT("gpt-5-mini", msg);
                } else {
                    reply = "未知模型";
                }
                hideTyping();
                addMessage("assistant", reply, false, true);
            } catch (err) {
                hideTyping();
                addMessage("assistant", `⚠️ 调用失败: ${err.message}`, true, false);
            } finally {
                isWaiting = false;
                connStatus.innerText = "● 就绪";
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
        
        function verifyAndUnlock() {
            const entered = pwdInput.value;
            if (entered === __secure.password) {
                loginError.innerText = "";
                loginPanel.style.display = "none";
                chatPanel.style.display = "flex";
                // 预加载密钥
                cachedGeminiKey = __secure.geminiKey;
                cachedGptKey = __secure.gptKey;
                if (!cachedGeminiKey || !cachedGptKey) {
                    addMessage("assistant", "⚠️ 密钥加载失败，请检查配置。", true, false);
                    connStatus.innerText = "⚠️ 密钥错误";
                } else {
                    connStatus.innerText = "● 准备就绪";
                }
                userInput.focus();
            } else {
                loginError.innerText = "密码错误，访问被拒绝";
                pwdInput.value = "";
                pwdInput.focus();
            }
        }
        
        unlockBtn.addEventListener('click', verifyAndUnlock);
        pwdInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyAndUnlock();
        });
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !isWaiting && userInput.value.trim()) {
                handleSend();
            }
        });
        
        // 渲染欢迎消息
        const welcomeBubble = document.querySelector('#messagesContainer .message.assistant .bubble');
        if (welcomeBubble) {
            const originalText = welcomeBubble.innerText;
            welcomeBubble.innerHTML = renderMarkdownAndMath(originalText);
        }
        
        console.log("%c🔐 安全环境已启动 | 支持 Gemini / GPT-4o / GPT-5 / GPT-5-mini | 密钥已混淆 | 默认 GPT-5-mini", "color: #3b82f6");
    });
</script>
</body>
</html>
