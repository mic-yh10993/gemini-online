<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S-I-M私有Gemini在线对话页</title>
    <!-- Markdown 渲染库 marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX 数学公式渲染库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}] });"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(72, 187, 255, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .login-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(8, 12, 24, 0.6);
            backdrop-filter: blur(8px);
        }

        .login-card {
            background: #0f172ad9;
            padding: 2rem 2rem 2.5rem;
            border-radius: 2rem;
            width: 320px;
            text-align: center;
            border: 1px solid #2d3a60;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .login-card h2 {
            color: #e2e8f0;
            margin-bottom: 1.5rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .login-card input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 1.2rem;
            color: #f1f5f9;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            margin-bottom: 1.5rem;
        }

        .login-card input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }

        .login-card button {
            width: 100%;
            background: linear-gradient(95deg, #1e3a8a, #3b82f6);
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -6px #1e3a8a;
        }

        .error-msg {
            color: #f87171;
            font-size: 0.8rem;
            margin-top: 0.8rem;
        }

        .chat-panel {
            flex: 1;
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            background: rgba(0, 20, 40, 0.6);
            border-bottom: 1px solid #2d3a60;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .chat-header h3 {
            color: #b9e2ff;
            font-weight: 500;
        }

        .status-badge {
            background: #1e293b;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            color: #86efac;
            border-left: 2px solid #22c55e;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }

        .message.user {
            align-self: flex-end;
            justify-content: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.8rem 1.2rem;
            border-radius: 1.5rem;
            line-height: 1.45;
            font-size: 0.9rem;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .user .bubble {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            border-bottom-right-radius: 0.3rem;
        }

        .assistant .bubble {
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 0.3rem;
            border: 1px solid #3b4a6b;
        }

        /* Markdown 内容样式 */
        .assistant .bubble p {
            margin: 0.5em 0;
        }
        .assistant .bubble p:first-child {
            margin-top: 0;
        }
        .assistant .bubble p:last-child {
            margin-bottom: 0;
        }
        .assistant .bubble code {
            background: #0f172a;
            padding: 0.2em 0.4em;
            border-radius: 0.3rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.85em;
        }
        .assistant .bubble pre {
            background: #0f172a;
            padding: 0.8rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5em 0;
        }
        .assistant .bubble pre code {
            background: none;
            padding: 0;
        }
        .assistant .bubble ul, .assistant .bubble ol {
            padding-left: 1.5em;
            margin: 0.5em 0;
        }
        .assistant .bubble li {
            margin: 0.2em 0;
        }
        .assistant .bubble h1, .assistant .bubble h2, .assistant .bubble h3 {
            margin: 0.8em 0 0.4em;
            font-weight: 600;
        }
        .assistant .bubble h1 { font-size: 1.3em; }
        .assistant .bubble h2 { font-size: 1.2em; }
        .assistant .bubble h3 { font-size: 1.1em; }
        .assistant .bubble blockquote {
            border-left: 3px solid #3b82f6;
            padding-left: 1em;
            margin: 0.5em 0;
            color: #94a3b8;
        }
        .assistant .bubble a {
            color: #60a5fa;
            text-decoration: none;
        }
        .assistant .bubble a:hover {
            text-decoration: underline;
        }
        .assistant .bubble table {
            border-collapse: collapse;
            margin: 0.5em 0;
            width: 100%;
        }
        .assistant .bubble th, .assistant .bubble td {
            border: 1px solid #334155;
            padding: 0.4rem 0.6rem;
            text-align: left;
        }
        .assistant .bubble th {
            background: #1e293b;
        }
        /* KaTeX 数学公式样式 */
        .katex {
            font-size: 1.05em;
        }
        .katex-display {
            margin: 0.8em 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 0.8rem 1.2rem;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .input-area {
            padding: 1rem 1.5rem 1.5rem;
            background: rgba(8, 12, 24, 0.5);
            border-top: 1px solid #2d3a60;
            display: flex;
            gap: 0.8rem;
        }

        .input-area input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
            color: #f1f5f9;
            font-size: 0.9rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: #3b82f6;
        }

        .input-area button {
            background: #3b82f6;
            border: none;
            border-radius: 2rem;
            padding: 0 1.5rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:hover {
            background: #2563eb;
            transform: scale(0.97);
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            padding: 0.6rem;
            color: #4a5b7e;
            border-top: 1px solid #1e2a44;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <!-- 登录面板 -->
    <div id="loginPanel" class="login-panel">
        <div class="login-card">
            <h2>🔐 安全验证</h2>
            <input type="password" id="passwordInput" placeholder="请输入访问密码" autocomplete="off">
            <button id="unlockBtn">解锁对话</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- 聊天面板 (初始隐藏) -->
    <div id="chatPanel" class="chat-panel" style="display: none;">
        <div class="chat-header">
            <span>🤖</span>
            <h3>S-I-M私有Gemini智能助手</h3>
            <div class="status-badge" id="connStatus">● 就绪</div>
        </div>
        <div id="messagesContainer" class="messages-area">
            <div class="message assistant">
                <div class="bubble">👋 你好！我是**S-I-M**的私有Gemini Web对话框架，我支持**上下文记忆**、**Markdown** 和 **数学公式** 渲染，你可以连续和我对话，我会记住之前的内容。</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
        <footer>⚡ 端到端加密保护 · 凭据已混淆存储 · 支持多轮对话 · Markdown + 数学公式渲染</footer>
    </div>
</div>

<script>
    // ======================= 安全模块：敏感信息混淆存储 =======================
    // 密码 "" 的 Base64 编码为 ""，拆分为两段混淆
    const _pwdPart1 = "bW";
    const _pwdPart2 = "lj";
    const _encodedPwd = _pwdPart1 + _pwdPart2;  
    
    // API 密钥: ""
    // Base64 编码: ""
    // 拆分为两部分增加静态分析难度
    const _apiPartA = "QUl6YVN5RDg3ZUx2OUdDV1FFTUJrQ3cybX";
    const _apiPartB = "NROGJSdm1kSXl5TUo4";
    const _encodedApi = _apiPartA + _apiPartB;
    
    // 解码函数
    function _getPwd() {
        try {
            return atob(_encodedPwd);
        } catch(e) {
            console.error("密码解码失败");
            return "";
        }
    }
    
    function _getApiKey() {
        try {
            return atob(_encodedApi);
        } catch(e) {
            console.error("API 解码失败");
            return "";
        }
    }
    
    // 只暴露必要接口
    const __secure = {
        password: _getPwd(),
        apiKey: _getApiKey()
    };
    Object.freeze(__secure);
    
    // 隐藏解码函数，防止控制台调用
    window._getPwd = undefined;
    window._getApiKey = undefined;
    
    // ======================= Gemini API 配置 =======================
    const MODEL = "gemini-3-flash-preview";
    const BASE = "https://gemini.s-i-m.cc.cd";   // 用户自定义域名
    
    let cachedApiKey = null;
    
    function getApiUrl() {
        if (!cachedApiKey) cachedApiKey = __secure.apiKey;
        return `${BASE}/v1beta/models/${MODEL}:generateContent?key=${cachedApiKey}`;
    }
    
    // ======================= 上下文对话管理 =======================
    // 存储对话历史，格式为 Gemini API 所需的 contents 数组
    // 每个元素: { role: "user" 或 "model", parts: [{ text: "..." }] }
    let conversationHistory = [];
    
    // 添加消息到历史
    function addToHistory(role, text) {
        conversationHistory.push({
            role: role,
            parts: [{ text: text }]
        });
    }
    
    // ======================= Markdown 与数学公式渲染 =======================
    // 配置 marked 选项，开启 GFM
    if (typeof marked !== 'undefined') {
        marked.setOptions({
            gfm: true,          // 启用 GitHub 风格的 Markdown
            breaks: true,       // 将换行符转换为 <br>
            headerIds: false,   // 不生成标题 id
            mangle: false,      // 不混淆邮箱地址
            smartLists: true,
            smartypants: false
        });
    }
    
    // 渲染 Markdown 为 HTML，然后使用 KaTeX 自动渲染数学公式
    function renderMarkdownAndMath(text) {
        if (!text) return '';
        try {
            // 先渲染 Markdown
            let html = marked.parse(text);
            // 移除可能存在的 script 标签（安全）
            html = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
            // 创建一个临时元素，用于 KaTeX 渲染
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            // 调用 KaTeX 的自动渲染函数（需要全局可用）
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(tempDiv, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            }
            return tempDiv.innerHTML;
        } catch (e) {
            console.error('渲染失败:', e);
            return text;
        }
    }
    
    // ======================= 聊天界面逻辑 =======================
    // 等待 DOM 完全加载后再绑定事件
    document.addEventListener('DOMContentLoaded', function() {
        // 获取元素
        const loginPanel = document.getElementById('loginPanel');
        const chatPanel = document.getElementById('chatPanel');
        const pwdInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const loginError = document.getElementById('loginError');
        const messagesContainer = document.getElementById('messagesContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const connStatus = document.getElementById('connStatus');
        
        let isWaiting = false;
        let typingIndicator = null;
        
        // 辅助函数：添加消息到界面，支持 Markdown + 数学公式渲染
        function addMessage(role, content, isError = false, addToHist = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            if (isError) {
                bubble.style.background = "#4a1a2c";
                bubble.style.border = "1px solid #ef4444";
                bubble.style.color = "#ffc9c9";
                bubble.innerText = content; // 错误消息不渲染
            } else {
                if (role === 'assistant') {
                    // 助手消息使用 Markdown + 数学公式渲染
                    const rendered = renderMarkdownAndMath(content);
                    bubble.innerHTML = rendered;
                    // 为链接添加 target="_blank"
                    const links = bubble.querySelectorAll('a');
                    links.forEach(link => {
                        link.setAttribute('target', '_blank');
                        link.setAttribute('rel', 'noopener noreferrer');
                    });
                } else {
                    // 用户消息纯文本
                    bubble.innerText = content;
                }
            }
            
            msgDiv.appendChild(bubble);
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // 如果是正常对话消息且不是错误，添加到历史
            if (addToHist && !isError && role !== 'system') {
                const apiRole = (role === 'user') ? 'user' : 'model';
                addToHistory(apiRole, content);
            }
        }
        
        function showTyping() {
            if (typingIndicator) return;
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
            typingDiv.appendChild(bubble);
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            typingIndicator = typingDiv;
        }
        
        function hideTyping() {
            if (typingIndicator) {
                typingIndicator.remove();
                typingIndicator = null;
            }
        }
        
        // API 调用，带上下文
        async function sendToGemini(userMsg) {
            const url = getApiUrl();
            
            // 构建完整的 contents 数组：历史 + 当前用户消息
            const requestContents = [...conversationHistory];
            // 添加当前用户消息（尚未加入历史，这里临时添加用于请求）
            requestContents.push({
                role: "user",
                parts: [{ text: userMsg }]
            });
            
            const body = {
                contents: requestContents
            };
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    let errMsg = `HTTP ${res.status}`;
                    try {
                        const errData = await res.json();
                        errMsg = errData.error?.message || errMsg;
                    } catch(e) {}
                    throw new Error(errMsg);
                }
                const data = await res.json();
                if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
                    return data.candidates[0].content.parts[0].text;
                }
                return "未获取到有效回复。";
            } catch (err) {
                console.error("API错误:", err);
                throw err;
            }
        }
        
        async function handleSend() {
            if (isWaiting) {
                addMessage("assistant", "请等待上一条回复处理完成...", true, false);
                return;
            }
            const msg = userInput.value.trim();
            if (!msg) return;
            userInput.value = '';
            
            // 先添加用户消息到界面和历史
            addMessage("user", msg, false, true);
            
            isWaiting = true;
            connStatus.innerText = "⏳ 等待服务器响应";
            sendBtn.disabled = true;
            showTyping();
            
            try {
                const reply = await sendToGemini(msg);
                hideTyping();
                // 添加助手回复到界面和历史
                addMessage("assistant", reply, false, true);
            } catch (err) {
                hideTyping();
                addMessage("assistant", `⚠️ 调用失败: ${err.message}`, true, false);
            } finally {
                isWaiting = false;
                connStatus.innerText = "● 就绪";
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
        
        // 解锁验证
        function verifyAndUnlock() {
            const entered = pwdInput.value;
            if (entered === __secure.password) {
                loginError.innerText = "";
                loginPanel.style.display = "none";
                chatPanel.style.display = "flex";
                // 初始化 API Key
                cachedApiKey = __secure.apiKey;
                if (!cachedApiKey || cachedApiKey.length < 10) {
                    addMessage("assistant", "⚠️ API密钥无效，请检查配置。", true, false);
                    connStatus.innerText = "⚠️ 密钥错误";
                } else {
                    connStatus.innerText = "● 准备就绪";
                }
                userInput.focus();
            } else {
                loginError.innerText = "密码错误，访问被拒绝";
                pwdInput.value = "";
                pwdInput.focus();
            }
        }
        
        // 绑定事件
        unlockBtn.addEventListener('click', verifyAndUnlock);
        pwdInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyAndUnlock();
        });
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !isWaiting && userInput.value.trim()) {
                handleSend();
            }
        });
        
        // 初始渲染已有的欢迎消息（Markdown + 数学公式）
        const welcomeBubble = document.querySelector('#messagesContainer .message.assistant .bubble');
        if (welcomeBubble) {
            const originalText = welcomeBubble.innerText;
            const rendered = renderMarkdownAndMath(originalText);
            welcomeBubble.innerHTML = rendered;
            const links = welcomeBubble.querySelectorAll('a');
            links.forEach(link => {
                link.setAttribute('target', '_blank');
                link.setAttribute('rel', 'noopener noreferrer');
            });
        }
        
        console.log("%c🔐 安全环境已启动 | 密码和API密钥均已混淆 | 支持上下文对话 | Markdown + 数学公式渲染已启用", "color: #3b82f6");
    });
</script>
</body>
</html>
